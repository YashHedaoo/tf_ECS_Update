name: Dynatrace OneAgent ECS Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # ---- Required (set as GitHub Secrets) ----
  TF_VAR_ecs_cluster_name: ${{ secrets.ECS_CLUSTER_NAME }}
  TF_VAR_dynatrace_environment_url: ${{ secrets.DYNATRACE_ENVIRONMENT_URL }}
  TF_VAR_dynatrace_api_token: ${{ secrets.DYNATRACE_API_TOKEN }}
  # ---- Optional ----
  TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'us-east-1' }}
  TF_VAR_application_service_name: ${{ secrets.APPLICATION_SERVICE_NAME }}
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # [Step 1/8] Authenticate with AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "[Step 1/8] Authenticate with AWS"
        run: |
          echo "::group::🔑 Verifying AWS identity"
          aws sts get-caller-identity
          echo "Target region: $AWS_REGION"
          echo "::endgroup::"
          echo "✅ Authenticated with AWS"

      # [Step 2/8] Validate Configuration
      - name: "[Step 2/8] Validate Configuration"
        run: |
          echo "::group::🔍 Validating inputs and target cluster"
          fail=0

          if [ -z "$TF_VAR_ecs_cluster_name" ]; then
            echo "❌ ECS_CLUSTER_NAME secret is not set."; fail=1
          fi
          if [ -z "$TF_VAR_dynatrace_environment_url" ]; then
            echo "❌ DYNATRACE_ENVIRONMENT_URL secret is not set."; fail=1
          fi
          if [ -z "$TF_VAR_dynatrace_api_token" ]; then
            echo "❌ DYNATRACE_API_TOKEN secret is not set."; fail=1
          fi
          if [ "$fail" -eq 1 ]; then
            echo "::endgroup::"; exit 1
          fi

          echo "• Checking ECS cluster '$TF_VAR_ecs_cluster_name' is ACTIVE..."
          STATUS=$(aws ecs describe-clusters --clusters "$TF_VAR_ecs_cluster_name" \
            --query "clusters[0].status" --output text)
          if [ "$STATUS" != "ACTIVE" ]; then
            echo "❌ ECS cluster '$TF_VAR_ecs_cluster_name' not found or not ACTIVE (status: $STATUS)."
            echo "::endgroup::"; exit 1
          fi
          echo "  ✔ cluster is ACTIVE"

          if [ -n "$TF_VAR_application_service_name" ]; then
            echo "• Checking application service '$TF_VAR_application_service_name'..."
            SVC=$(aws ecs describe-services --cluster "$TF_VAR_ecs_cluster_name" \
              --services "$TF_VAR_application_service_name" \
              --query "services[0].status" --output text)
            if [ "$SVC" != "ACTIVE" ]; then
              echo "❌ Application service '$TF_VAR_application_service_name' not found or not ACTIVE."
              echo "::endgroup::"; exit 1
            fi
            echo "  ✔ application service is ACTIVE (will be restarted in Step 6)"
          else
            echo "• No application service provided — restart step will be skipped."
          fi
          echo "::endgroup::"
          echo "✅ Configuration valid"

      # [Step 3/8] Initialize Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: "[Step 3/8] Initialize Terraform"
        run: |
          echo "::group::⚙️ terraform init"
          terraform init -input=false
          echo "::endgroup::"
          echo "✅ Terraform initialized"

      # [Step 4/8] Register OneAgent Task Definition
      - name: "[Step 4/8] Register OneAgent Task Definition"
        run: |
          echo "::group::📝 Registering task definition"
          terraform apply -input=false -auto-approve -target=aws_ecs_task_definition.oneagent
          TASK_DEF_ARN=$(terraform output -raw oneagent_task_definition_arn)
          echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> "$GITHUB_ENV"
          echo "::endgroup::"
          echo "✅ Task definition registered: $TASK_DEF_ARN"

      # [Step 5/8] Deploy OneAgent Daemon Service
      - name: "[Step 5/8] Deploy OneAgent Daemon Service"
        run: |
          echo "::group::🚀 Applying DAEMON service"
          terraform apply -input=false -auto-approve
          SERVICE_NAME=$(terraform output -raw oneagent_service_name)
          echo "SERVICE_NAME=$SERVICE_NAME" >> "$GITHUB_ENV"
          echo "::endgroup::"

          echo "::group::⏳ Waiting for one OneAgent task per container instance"
          INSTANCES=$(aws ecs describe-clusters --clusters "$TF_VAR_ecs_cluster_name" \
            --query "clusters[0].registeredContainerInstancesCount" --output text)
          echo "Container instances in cluster: $INSTANCES"

          if [ "$INSTANCES" -eq 0 ]; then
            echo "⚠️  No container instances registered — nothing to schedule onto yet."
          else
            for i in $(seq 1 10); do
              RUNNING=$(aws ecs describe-services --cluster "$TF_VAR_ecs_cluster_name" \
                --services "$SERVICE_NAME" --query "services[0].runningCount" --output text)
              echo "  attempt $i/10 → running $RUNNING / $INSTANCES"
              if [ "$RUNNING" -eq "$INSTANCES" ]; then
                echo "✅ OneAgent running on all $INSTANCES instances"
                break
              fi
              if [ "$i" -eq 10 ]; then
                echo "⚠️  Only $RUNNING/$INSTANCES running after 5 min (they may still be starting)."
              fi
              sleep 30
            done
          fi
          echo "::endgroup::"

      # [Step 6/8] Restart Application Service (optional)
      - name: "[Step 6/8] Restart Application Service"
        run: |
          if [ -z "$TF_VAR_application_service_name" ]; then
            echo "⏭️  No application service configured — skipping restart."
            echo "   (New/restarted containers will still be instrumented automatically.)"
            exit 0
          fi
          echo "::group::🔄 Forcing new deployment of '$TF_VAR_application_service_name'"
          aws ecs update-service --cluster "$TF_VAR_ecs_cluster_name" \
            --service "$TF_VAR_application_service_name" --force-new-deployment >/dev/null
          echo "Waiting for the service to stabilize..."
          aws ecs wait services-stable --cluster "$TF_VAR_ecs_cluster_name" \
            --services "$TF_VAR_application_service_name"
          echo "::endgroup::"
          echo "✅ Application service restarted and stable"

      # [Step 7/8] Verify Deployment
      - name: "[Step 7/8] Verify Deployment"
        run: |
          echo "::group::🔎 Final verification"
          STATUS=$(aws ecs describe-services --cluster "$TF_VAR_ecs_cluster_name" \
            --services "$SERVICE_NAME" --query "services[0].status" --output text)
          INSTANCES=$(aws ecs describe-clusters --clusters "$TF_VAR_ecs_cluster_name" \
            --query "clusters[0].registeredContainerInstancesCount" --output text)
          RUNNING=$(aws ecs describe-services --cluster "$TF_VAR_ecs_cluster_name" \
            --services "$SERVICE_NAME" --query "services[0].runningCount" --output text)
          echo "OneAgent service status : $STATUS"
          echo "Running / instances     : $RUNNING / $INSTANCES"
          echo "::endgroup::"
          if [ "$INSTANCES" -ne 0 ] && [ "$RUNNING" -eq "$INSTANCES" ]; then
            echo "✅ OneAgent running on every container instance"
          else
            echo "⚠️  Running ($RUNNING) does not yet match instances ($INSTANCES)"
          fi

      # [Step 8/8] Deployment Summary
      - name: "[Step 8/8] Deployment Summary"
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then ICON="✅"; else ICON="❌"; fi
          {
            echo "## $ICON Dynatrace OneAgent Deployment — ${{ job.status }}"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| AWS Region | \`$TF_VAR_aws_region\` |"
            echo "| ECS Cluster | \`$TF_VAR_ecs_cluster_name\` |"
            echo "| OneAgent Service | \`dynatrace-oneagent\` (DAEMON) |"
            echo "| Task Definition | \`${TASK_DEF_ARN:-not registered}\` |"
            if [ -n "$TF_VAR_application_service_name" ]; then
              echo "| App Restarted | \`$TF_VAR_application_service_name\` |"
            else
              echo "| App Restarted | skipped (none configured) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          echo "$ICON Deployment finished with status: ${{ job.status }}"
